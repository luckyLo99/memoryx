[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
norecursedirs =
    .git
    .venv
    venv
    build
    dist
    memoryx-pure-release
    node_modules
    __pycache__
addopts =
    --ignore=memoryx-pure-release
    --ignore=scripts/test_siliconflow_embedding.py
    --ignore=tools/test_siliconflow_embedding.py
