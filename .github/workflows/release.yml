name: Release

on:
  push:
    tags:
      - 'v*'
      - 'baseline/*'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }

      - run: pip install -e ".[dev]"

      - name: Verify import
        run: python -c "import memoryx; print('ok v'+memoryx.__version__)"

      - name: Schema check
        run: |
          python -c "
import sqlite3, os
db='/tmp/t.db'
if os.path.exists(db): os.remove(db)
c=sqlite3.connect(db)
c.executescript(open('db/schema.sql').read())
c.close()
print('Schema: OK')
"

      - name: Core unit tests
        run: |
          python -m pytest -q -x --tb=short             tests/unit/cognitive/test_cognitive_learning.py             tests/unit/cognitive/test_cognitive_timeline_opinion.py             tests/unit/misc/test_p5_self_editor_consolidation.py             -k "not api and not e2e" 2>&1 ||           python -m pytest -q -x --tb=short             tests/unit/cognitive/test_cognitive_learning.py             tests/unit/cognitive/test_cognitive_timeline_opinion.py             tests/unit/misc/test_p5_self_editor_consolidation.py

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
