name: MemoryX ReleaseGate

on:
  pull_request:
  push:
    branches:
      - memoryx-2-kernel
      - main

jobs:
  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install MemoryX (lite)
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .
          cp .env.example.lite .env
      - name: Run memoryx doctor
        run: |
          python -m memoryx.cli.doctor --profile lite || echo "Doctor check had warnings (non-fatal)"
      - name: Verify release truth
        run: |
          python -m memoryx.dev.check_release_truth || echo "Manifest check non-fatal"

  release-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show system info
        run: |
          python --version
          pip list 2>/dev/null || true
          echo "--- specific deps ---"
          pip list 2>/dev/null | grep -iE 'aiohttp|pydantic|structlog|mcp|lancedb' || true

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev,mcp]"

      - name: Diagnose package imports
        run: |
          python - <<'PY'
          import importlib.util
          import memoryx
          print("memoryx file:", memoryx.__file__)
          for name in ["memoryx.runtime", "memoryx.runtime.events", "fastapi"]:
              spec = importlib.util.find_spec(name)
              print(name, "=>", spec.origin if spec else None)
              if spec is None:
                  raise SystemExit(f"missing import: {name}")
          PY

      - name: Collect representative runtime test
        run: |
          python -m pytest --collect-only --tb=long -vv tests/unit/runtime/test_app_factory_lifespan.py

      - name: Collect tests
        run: |
          python -m pytest --collect-only --tb=short \
            --ignore=memoryx-pure-release \
            --ignore=tools \
            --ignore=scripts/test_siliconflow_embedding.py

      - name: Run tests
        run: |
          python -m pytest --tb=short \
            --ignore=memoryx-pure-release \
            --ignore=tools \
            --ignore=scripts/test_siliconflow_embedding.py

      - name: Run MemoryX ReleaseGate
        run: |
          python scripts/run_memoryx_release_gate.py

      - name: Repository guard
        run: |
          python scripts/memoryx_repo_guard.py
