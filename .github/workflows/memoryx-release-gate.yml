name: MemoryX ReleaseGate

on:
  pull_request:
  push:
    branches:
      - memoryx-2-kernel
      - main

jobs:
  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install MemoryX
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .
      - name: Verify import
        run: python -c "import memoryx; print('ok v'+memoryx.__version__)"
      - name: Verify release truth
        run: python -m memoryx.dev.check_release_truth 2>/dev/null || echo "Manifest check non-fatal"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Run ruff check
        run: ruff check memoryx/ tests/

  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev,mcp]"
      - name: Collect tests
        run: python -m pytest --collect-only --tb=short --ignore=tests/e2e --ignore=tools --ignore=scripts/test_siliconflow_embedding.py
      - name: Run tests with coverage
        run: python -m pytest --tb=short --ignore=tests/e2e --ignore=tools --ignore=scripts/test_siliconflow_embedding.py -x -q --cov=memoryx --cov-report=term --cov-fail-under=60