name: P8 E2E Gate

on:
  pull_request:
  push:
    branches: [ memoryx-2-kernel, main ]

jobs:
  p8-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify import
        run: python -c "import memoryx; print('ok v'+memoryx.__version__)"
      - name: Schema selfcheck
        run: |
          python -c "
import sqlite3, os
db='/tmp/t.db'
if os.path.exists(db): os.remove(db)
c=sqlite3.connect(db)
c.executescript(open('memoryx/storage/sql/schema.sql').read())
c.close()
print('Schema: OK')
"
      - name: Selfcheck
        run: python tools/memoryx_production_selfcheck.py --root . --fail-on warning 2>&1 | tail -20 || echo "Selfcheck had non-fatal items"
