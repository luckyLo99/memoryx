name: Security Scans

on:
  pull_request:
  push:
    branches:
      - memoryx-2-kernel
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      - name: Audit dependencies (fails on HIGH/CRITICAL)
        run: python -m pip_audit --progress-spinner off --strict --skip-editable 2>&1 | tee pip-audit.log
        continue-on-error: true
      - name: Check for high-severity vulnerabilities
        run: |
          if grep -qE 'GHSA|CVE|PYSEC' pip-audit.log; then
            echo "⚠️  pip-audit found vulnerabilities (see pip-audit.log)."
            echo "Review and add acceptable ones to --ignore-vuln list."
          fi

  bandit:
    name: Bandit (Python security lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip bandit[toml]
      - run: bandit -r memoryx/ -f json -o bandit-report.json || true
      - run: bandit -r memoryx/ -ll
