name: Privacy Guard

on:
  pull_request:
    branches: [memoryx-2-kernel, main]
  push:
    branches: [memoryx-2-kernel, main]

jobs:
  leak-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for hardcoded home paths
        run: |
          echo "=== Scanning for /home/<user>/ hardcoded paths ==="
          HITS=$(git grep -InP '/home/[^/]+/' -- ':!.github' ':!*.md' ':!tests/' ':!__pycache__' 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ Found hardcoded /home/*/ paths:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No hardcoded home paths found"

      - name: Check for tracked .env files
        run: |
          echo "=== Scanning for tracked .env files ==="
          HITS=$(git ls-files | grep -iE '\.env$' | grep -v '\.env\.example' | grep -v '\.env\.template' || true)
          if [ -n "$HITS" ]; then
            echo "❌ Found tracked .env files:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No .env files tracked"

      - name: Check for API keys / tokens in source code
        run: |
          echo "=== Scanning for API keys / tokens in source ==="
          ERRORS=""
          EXCLUDE=':!.github'':!*.md'':!tests/'':!__pycache__'

          # ── GitHub tokens ──────────────────────────────────────
          for pat in ghp gho ghu ghs ghr; do
            HITS=$(git grep -InP "${pat}_[A-Za-z0-9]{36}" -- $EXCLUDE 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              ERRORS="$ERRORS\n❌ Found ${pat}_ GitHub token:\n$HITS"
            fi
          done
          # Fine-grained PAT (github_pat_XXXX_YYYY)
          HITS=$(git grep -InP 'github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found github_pat_ fine-grained token:\n$HITS"
          fi

          # ── AI/LLM API keys ──────────────────────────────────
          # OpenAI sk-* (sk-proj-, sk-org-, sk-svc-, sk-sa-* etc.)
          HITS=$(git grep -InP '(?<![a-zA-Z])sk-[A-Za-z0-9_\-]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found OpenAI sk- API key:\n$HITS"
          fi
          # Anthropic sk-ant-*
          HITS=$(git grep -InP 'sk-ant-(api|auth)[0-9]{2}-[A-Za-z0-9_\-]{85,}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Anthropic sk-ant- API key:\n$HITS"
          fi
          # Anthropic (short form - wider catch)
          HITS=$(git grep -InP 'sk-ant-[A-Za-z0-9_\-]{20,}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Anthropic sk-ant-* key:\n$HITS"
          fi
          # NVIDIA nvapi-*
          HITS=$(git grep -InP '(?<![a-zA-Z])nvapi-[A-Za-z0-9_\-]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found NVIDIA nvapi- key:\n$HITS"
          fi
          # Hugging Face hf_*
          HITS=$(git grep -InP '(?<![a-zA-Z])hf_[A-Za-z0-9]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found HuggingFace hf_ token:\n$HITS"
          fi
          # SenseNova / custom AI tokens
          HITS=$(git grep -InP '(?<![a-zA-Z])sensenova-[A-Za-z0-9_\-]{10,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found sensenova- token:\n$HITS"
          fi
          # DeepSeek / together / openrouter style tokens
          HITS=$(git grep -InP '(?<![a-zA-Z])(ds_|sk-ds-)[A-Za-z0-9_\-]{10,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found DeepSeek/OpenRouter token:\n$HITS"
          fi
          # General tp-* prefix (user-specified format)
          HITS=$(git grep -InP '(?<![a-zA-Z])tp-[A-Za-z0-9_\-]{10,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found tp-* token:\n$HITS"
          fi

          # ── Cloud provider keys ──────────────────────────────
          # AWS IAM (AKIA/ASIA/AROA/AIDA/ANPA/ANVA/APKA)
          HITS=$(git grep -InP '(?<![A-Z0-9])(AKIA|ASIA|AROA|AIDA|ANPA|ANVA|APKA)[0-9A-Z]{16}(?![A-Z0-9])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found AWS access key:\n$HITS"
          fi
          # Google AIza*
          HITS=$(git grep -InP '(?<![a-zA-Z])AIza[0-9A-Za-z_\-]{35}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Google API key:\n$HITS"
          fi
          # Google OAuth ya29.*
          HITS=$(git grep -InP 'ya29\.[0-9A-Za-z_\-]{50,}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Google OAuth token:\n$HITS"
          fi

          # ── GitLab ────────────────────────────────────────────
          HITS=$(git grep -InP 'glpat-[A-Za-z0-9_\-]{20,}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found GitLab glpat- token:\n$HITS"
          fi

          # ── Messaging / Chat ─────────────────────────────────
          # Slack xoxb- / xoxp- / xapp-
          for pat in xoxb xoxp xapp xoxe; do
            HITS=$(git grep -InP "${pat}-[0-9A-Za-z_\-]{20,}" -- $EXCLUDE 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              ERRORS="$ERRORS\n❌ Found Slack ${pat}- token:\n$HITS"
            fi
          done
          # Telegram bot token (digits:hex)
          HITS=$(git grep -InP '[0-9]{8,10}:[a-zA-Z0-9_\-]{35}' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Telegram bot token:\n$HITS"
          fi

          # ── Package registries ───────────────────────────────
          # npm_
          HITS=$(git grep -InP '(?<![a-zA-Z])npm_[A-Za-z0-9]{36}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found npm_ token:\n$HITS"
          fi
          # PyPI pypi-*
          HITS=$(git grep -InP '(?<![a-zA-Z])pypi-[A-Za-z0-9_\-]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found PyPI token:\n$HITS"
          fi

          # ── Payment ──────────────────────────────────────────
          HITS=$(git grep -InP '(?<![a-zA-Z])sk_live_[0-9a-zA-Z]{24,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Stripe sk_live_ key:\n$HITS"
          fi
          HITS=$(git grep -InP '(?<![a-zA-Z])rk_live_[0-9a-zA-Z]{24,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Stripe rk_live_ key:\n$HITS"
          fi
          # SendGrid SG.*
          HITS=$(git grep -InP '(?<![a-zA-Z])SG\.[a-zA-Z0-9_\-]{22}\.[a-zA-Z0-9_\-]{43}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found SendGrid SG. key:\n$HITS"
          fi

          # ── Docker ───────────────────────────────────────────
          HITS=$(git grep -InP '(?<![a-zA-Z])dckr_pat_[A-Za-z0-9_\-]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Docker Hub dckr_pat_ token:\n$HITS"
          fi

          # ── E-commerce ──────────────────────────────────────
          for pat in shpat shppa shpca shpss; do
            HITS=$(git grep -InP "${pat}_[a-fA-F0-9]{32}" -- $EXCLUDE 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              ERRORS="$ERRORS\n❌ Found Shopify ${pat}_ token:\n$HITS"
            fi
          done

          # ── Email / Comms ────────────────────────────────────
          HITS=$(git grep -InP '(?<![a-zA-Z])key-[0-9a-zA-Z]{32}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found Mailgun key- token:\n$HITS"
          fi
          # SendGrid legacy
          HITS=$(git grep -InP '(?<![a-zA-Z])SG\.[a-zA-Z0-9_\-]{20,}(?![a-zA-Z])' -- $EXCLUDE 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n❌ Found SendGrid SG. key:\n$HITS"
          fi

          # ── Generic base64-like secrets (40+ alphanumeric) ───
          # Only flag if near known keywords
          HITS=$(git grep -InP '(api.?key|api.?secret|auth.?token|access.?token|secret.?key)[:=] *["'"'"']?[A-Za-z0-9_\-]{30,}["'"'"']?' -- $EXCLUDE ':!*.pyc' 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            ERRORS="$ERRORS\n⚠️  Possible generic secret (check manually):\n$HITS"
          fi

          # ── Report ───────────────────────────────────────────
          if [ -n "$ERRORS" ]; then
            echo -e "$ERRORS"
            exit 1
          fi
          echo "✅ No API keys or tokens found in source"

      - name: Check git author identity
        run: |
          echo "=== Checking commit author identity ==="
          COMMITS=$(git log --format="%H %ae %an" "${{ github.event.before }}".."${{ github.event.after }}" 2>/dev/null || git log --format="%H %ae %an" -5 2>/dev/null)
          echo "$COMMITS"
          BAD=$(echo "$COMMITS" | grep -v 'noreply.github.com\|@users.noreply.github.com\|@github.com' | grep -v 'dependabot' || true)
          if [ -n "$BAD" ]; then
            echo "⚠️  WARNING: Some commits use non-GitHub-noreply emails:"
            echo "$BAD"
            echo "Consider configuring git user.email to your GitHub noreply address."
          else
            echo "✅ All commit emails are GitHub noreply addresses"
          fi

      - name: Summary
        run: |
          echo "==================================="
          echo "  ✅ Privacy Guard: All checks passed"
          echo "==================================="
